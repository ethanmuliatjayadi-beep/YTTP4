<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube to MP4 & MP3 Converter | Fast Local Video Downloader</title>
  <meta name="description" content="Convert YouTube links to MP4 video or MP3 audio with a clean local downloader. Paste a YouTube URL, choose MP4 or MP3, and start your download.">
  <meta name="keywords" content="YouTube to MP4, YouTube to MP3, YouTube converter, video downloader, audio downloader">
  <meta name="robots" content="index, follow">
  <meta name="author" content="YouTube Converter">
  <meta name="theme-color" content="#2563eb">
  <link rel="canonical" href="/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="YouTube to MP4 & MP3 Converter">
  <meta property="og:description" content="Paste a YouTube link, choose MP4 video or MP3 audio, and download through a simple local converter.">
  <meta property="og:url" content="/">
  <meta property="og:site_name" content="YouTube Converter">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="YouTube to MP4 & MP3 Converter">
  <meta name="twitter:description" content="A clean, simple YouTube-to-MP4 and YouTube-to-MP3 downloader for local use.">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "YouTube to MP4 & MP3 Converter",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Any",
      "description": "A focused local web application for converting YouTube links to MP4 video or MP3 audio downloads.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: light;
      --page: #f4f7fb;
      --surface: #ffffff;
      --ink: #111827;
      --muted: #5b6472;
      --line: #d8dee8;
      --blue: #2563eb;
      --blue-dark: #1e40af;
      --teal: #0f766e;
      --teal-soft: #d9f2ee;
      --danger: #b42318;
      --danger-soft: #fee4e2;
      --shadow: 0 18px 50px rgba(17, 24, 39, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(315deg, rgba(15, 118, 110, 0.14), transparent 38%),
        var(--page);
    }

    main {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 48px 20px;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .converter {
      width: min(100%, 680px);
      background: var(--surface);
      border: 1px solid rgba(216, 222, 232, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 760;
      letter-spacing: 0;
    }

    .badge {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--teal-soft);
      color: #115e59;
      font-size: 13px;
      font-weight: 700;
    }

    form {
      display: grid;
      gap: 22px;
    }

    label {
      display: grid;
      gap: 10px;
      font-size: 14px;
      font-weight: 720;
      color: #263244;
    }

    input[type="url"] {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-size: 17px;
      color: var(--ink);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input[type="url"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    .format-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      min-inline-size: 0;
      margin: 0;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .format-toggle input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .format-toggle span {
      display: grid;
      min-height: 48px;
      place-items: center;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 750;
      color: var(--muted);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .format-toggle input:checked + span {
      background: var(--surface);
      color: var(--blue-dark);
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.1);
    }

    .format-toggle input:focus-visible + span {
      outline: 3px solid rgba(37, 99, 235, 0.24);
      outline-offset: 2px;
    }

    .action-row {
      min-height: 56px;
      display: grid;
      align-items: stretch;
    }

    button {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #ffffff;
      font: inherit;
      font-size: 16px;
      font-weight: 780;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: var(--blue-dark);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: wait;
    }

    .progress {
      display: none;
      min-height: 56px;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      background: #f8fafc;
      color: #263244;
      font-size: 14px;
      font-weight: 720;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid rgba(37, 99, 235, 0.18);
      border-top-color: var(--blue);
      animation: spin 850ms linear infinite;
    }

    .bar {
      position: relative;
      height: 7px;
      flex: 1;
      overflow: hidden;
      border-radius: 999px;
      background: #e7edf6;
    }

    .bar::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      animation: load 1.1s ease-in-out infinite;
    }

    .status {
      min-height: 22px;
      margin: 0;
      font-size: 14px;
      font-weight: 650;
      color: var(--muted);
    }

    .status.error {
      min-height: auto;
      border-radius: 8px;
      padding: 12px 14px;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .status.success {
      color: var(--teal);
    }

    .trust-note {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    body.loading button {
      display: none;
    }

    body.loading .progress {
      display: flex;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes load {
      0% {
        transform: translateX(-110%);
      }
      100% {
        transform: translateX(245%);
      }
    }

    @media (max-width: 620px) {
      main {
        padding: 24px 14px;
      }

      .converter {
        padding: 22px;
      }

      .header {
        display: grid;
        justify-items: start;
      }

      h1 {
        font-size: 26px;
      }

      .format-toggle {
        grid-template-columns: 1fr;
      }

      .progress {
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="converter" aria-labelledby="page-title">
      <div class="header">
        <h1 id="page-title">YouTube Converter</h1>
        <div class="badge">MP4 / MP3</div>
      </div>

      <form id="converter-form" novalidate>
        <label for="youtube-url">
          Paste YouTube Link Here
          <input id="youtube-url" name="url" type="url" inputmode="url" autocomplete="off" required>
        </label>

        <fieldset class="format-toggle" aria-label="Output format">
          <label>
            <input type="radio" name="format" value="mp4" checked>
            <span>MP4 (Video)</span>
          </label>
          <label>
            <input type="radio" name="format" value="mp3">
            <span>MP3 (Audio)</span>
          </label>
        </fieldset>

        <div class="action-row">
          <button id="submit-button" type="submit">Convert &amp; Download</button>
          <div class="progress" role="status" aria-live="polite">
            <span class="spinner" aria-hidden="true"></span>
            <span class="bar" aria-hidden="true"></span>
            <span>Please wait while it loads, download will start depending on file size!</span>
          </div>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
        <p class="trust-note">For personal use with videos you own, created, or have permission to download.</p>
      </form>
    </section>
  </main>

  <script>
    const form = document.querySelector("#converter-form");
    const urlInput = document.querySelector("#youtube-url");
    const submitButton = document.querySelector("#submit-button");
    const statusMessage = document.querySelector("#status");
    const formatInputs = Array.from(document.querySelectorAll('input[name="format"]'));

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearStatus();

      const url = urlInput.value.trim();
      const format = formatInputs.find((input) => input.checked)?.value;

      if (!isYouTubeUrl(url)) {
        showStatus("Only YouTube links are supported.", "error");
        urlInput.focus();
        return;
      }

      if (!["mp4", "mp3"].includes(format)) {
        showStatus("Choose MP4 (Video) or MP3 (Audio).", "error");
        return;
      }

      setLoading(true);

      try {
        const response = await fetch("/process-stream", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url, format })
        });

        if (!response.ok) {
          const errorPayload = await response.json().catch(() => ({}));
          throw new Error(errorPayload.error || "Conversion failed.");
        }

        const blob = await response.blob();
        if (!blob.size) {
          throw new Error("The converted file was empty.");
        }

        const filename = filenameFromDisposition(response.headers.get("Content-Disposition")) || `youtube_download.${format}`;
        downloadBlob(blob, filename);
        showStatus("Download ready.", "success");
      } catch (error) {
        showStatus(error.message || "Conversion failed.", "error");
      } finally {
        setLoading(false);
      }
    });

    function isYouTubeUrl(value) {
      try {
        const parsed = new URL(value);
        const host = parsed.hostname.toLowerCase().replace(/\.$/, "");
        return ["http:", "https:"].includes(parsed.protocol)
          && (host === "youtu.be"
            || host === "youtube.com"
            || host.endsWith(".youtube.com")
            || host === "youtube-nocookie.com"
            || host.endsWith(".youtube-nocookie.com"));
      } catch {
        return false;
      }
    }

    function setLoading(isLoading) {
      document.body.classList.toggle("loading", isLoading);
      submitButton.disabled = isLoading;
      urlInput.disabled = isLoading;
      formatInputs.forEach((input) => {
        input.disabled = isLoading;
      });
    }

    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = `status ${type}`;
    }

    function clearStatus() {
      statusMessage.textContent = "";
      statusMessage.className = "status";
    }

    function filenameFromDisposition(disposition) {
      if (!disposition) {
        return "";
      }

      const match = disposition.match(/filename="([^"]+)"/i);
      return match ? match[1] : "";
    }

    function downloadBlob(blob, filename) {
      const objectUrl = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = objectUrl;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(objectUrl);
    }
  </script>
</body>
</html>
